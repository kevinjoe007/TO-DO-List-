<!DOCTYPE html>
<html>
<head>
  <title>My To-Do List</title>
  <link rel="stylesheet" href="style.css>
</head>
<body>

<div class="container">

  <h2>My To-Do List</h2>
  <p class="subtitle">Simple CRUD App — Create, Read, Update, Delete</p>

  <div class="form-box">
    <b>Add New Task</b>
    <div class="form-row">
      <label>Task:</label>
      <input type="text" id="taskInput" placeholder="enter task here..."/>
      <label>Priority:</label>
      <select id="priorityInput">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>
    <span class="err-msg" id="errMsg"></span>
  </div>

  <div class="filter-row">
    <label>Filter by priority:</label>
    <select onchange="renderTasks(this.value)" id="filterSel">
      <option value="All">All</option>
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>
    <span class="count-txt" id="countTxt"></span>
  </div>

  <div id="taskList"></div>

  <p class="footer">made with html, css &amp; javascript</p>

</div>
<script rel="script" href="script.js"></script>
</body>
</html>
